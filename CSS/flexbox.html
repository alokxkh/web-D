<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .container{
            width: 80vw;
            height: 90vh;
            /* padding: 6px; */
            border: 2px solid red;
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            /* align-items: flex-end; */
            flex-wrap: wrap;
            gap: 20px;
        }

        .box{
            height: 56px;
            width: 100px;
            /* margin: 5px; */
            border: 2px solid green;
            flex-grow: 1; /*entire width taken*/
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            Box1
        </div>
        <div class="box"> Box2</div>
        <div class="box"> Box3</div>
        <div class="box"> Box4</div>
        <div class="box"> Box5</div>
    </div>
</body>
</html>
