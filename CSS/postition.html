<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>

    <style>
        .container{
            width: 514px;
            height: 144px;
            border: 2px solid red;
        }

        .box1{
            width: 194px;
            height: 114px;
            border: 2px solid blue;
            background-color: aqua;
            position: relative;
            bottom: 23px;
            left: 33px;
        }
        .ad{
            border: 2px solid green;
            background-color: beige;
            padding: 23px;
            position:sticky;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">
            I am box 1
        </div>
        <div class="ad">
            Purchase thid drink at 23% discount
        </div>
    </div>
</body>
</html>
