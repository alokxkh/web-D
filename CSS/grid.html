<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .container{
            border: 2px solid red;
            display: grid;
            grid-template-columns: 200px 2fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        .box{
            border: 2px solid green;
            background-color: aquamarine;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            This is a div
        </div>
        <div class="box">
            This is a div
        </div>
        <div class="box">
            This is a div
        </div>
    </div>
</body>
</html>
