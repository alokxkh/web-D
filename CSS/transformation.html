<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformation</title>
    <style>
        .container{
            background-color: red;
            width: 450px;
            height: 70vh;

        }
        .box{
            height: 23px;
            width: 23px;
            background-color: beige;
            margin: 5px;
            transform: rotate(45deg) translateX(100px) scale(2);}
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            This is a box1
        </div>
    </div>
</body>
</html>
