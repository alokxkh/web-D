<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
    <script>
        console.log("I am a Variable");

        let name = "Alok";
        let age = 22;
        console.log(age);
        const c = 167;

        age = "Nitin";
        console.log(name);
        console.log(age);
        console.log(c);


        console.log(typeof "Hello");
        console.log(typeof 123);
        console.log(typeof true);
        console.log(typeof undefined);
        console.log(typeof null);
        console.log(typeof {});
        
    </script>
</head>

<body>
    This is for understanding variables in JavaScript.
</body>

</html>
