<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JavaScript</title>
    <script>

        for (let i = 0; i < 5; i++) {
            console.log(i);
        }

        let j = 0;
        while(j <= 3){
            console.log(j);
            j++;
        }

        let num=0;

        do{
            console.log(num);
            num++;      
        } while(num < 9);


        let object1 = {
            name: "Alok",
            age: 20,
            isStudent: true,
            fathersName: "Manoj"
        };

        for(key in object1){
            console.log("The value of key - ",key,"for object-", object1[key]);
        }
    </script>
</head>

</html>
