<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break and Continue</title>
    <script>
        for (let i = 0; i < 10; i++) {
            if (i == 5) {
                continue; // Skip the rest of the loop body when i is 5
            }
            console.log(i);
        }

        for (let j = 0; j < 10; j++) {
            if (j == 5) {
                break; // Exit the loop when j is 5
            }
            console.log(j);
        }
    </script>
</head>
<body>
    
</body>
</html>
