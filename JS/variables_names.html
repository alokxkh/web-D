<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Names</title>
    <script>
        let $alok = 45; // starts with a letter or $ or _
        let _alok = 45; // starts with a letter or $ or _
        let alok123 = 45; // can contain letters and numbers but cannot start with a number
        // let 123alok = 45; // cannot start with a number

        let alok = 45; // cannot use reserved keywords as variable names

        let firstName = "Alok"; // camelCase is a common convention for variable names
        let last_name = "Kharwar"; // snake_case is another convention for variable names

        let isLoggedIn = true; // boolean variable
        let hasAccess = false; // boolean variable

        
    </script>
</head>
<body>
    
</body>
</html>
