<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators</title>
    <script>
        console.log("Operators in JavaScript");
        // Arithmetic Operators
        let a = 10;
        let b = 5;
        console.log("Addition:", a + b); // 15
        console.log("Subtraction:", a - b); // 5
        console.log("Multiplication:", a * b); // 50
        console.log("Division:", a / b); // 2
        console.log("Modulus:", a % b); // 0
        console.log("Exponentiation:", a ** b); // 100000

        // Assignment Operators
        let c = 10;
        c += 5; // c = c + 5
        console.log("c after += 5:", c); // 15
        c -= 3; // c = c - 3
        console.log("c after -= 3:", c); // 12
        c *= 2; // c = c * 2
        console.log("c after *= 2:", c); // 24
        c /= 4; // c = c / 4
        console.log("c after /= 4:", c); // 6

        // Comparison Operators
        console.log("a == b:", a == b); // false
        console.log("a != b:", a != b); // true
        console.log("a > b:", a > b); // true
        console.log("a < b:", a < b); // false
        console.log("a >= b:", a >= b); // true
        console.log("a <= b:", a <= b); // false

        // Logical Operators
        let x = true;
        let y = false;
        console.log("x && y:", x && y); // false
        console.log("x || y:", x || y); // true
        console.log("!x:", !x); // false
        console.log("!y:", !y); // true

        // Ternary Operator
        let age = 18;
        let canVote = age >= 18 ? "Yes" : "No";
        console.log("Can vote:", canVote); // Yes
        
    </script>
</head>
<body>
    Operators in JavaScript.
</body>
</html>
