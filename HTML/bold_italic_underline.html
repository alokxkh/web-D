<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold Italic Underline </title>
</head>
<body>
    <p>I am a good <b>boy</b> </p>
    <p>I am a good <i>boy</i> </p>
    <p>I am a good <u>boy</u> </p>

    <p>I am a good <s>boy</s> </p>

    <p>H<sub>2</sub>O</p>
    <p>2<sup>n</sup></p>

    <p>I am a good <b> <i>Boy</i></b> </p>
</body>
</html>
