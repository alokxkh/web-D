<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Tags</title>
</head>
<body>
    <div> <!-- div take full width -->
        Hey
    </div>
    <div>
        I am a good
    </div>

    <span> <!-- span take only width required -->
        Hey
    </span>
    <span>
        I am a good
    </span>

    <header>
        <nav>
            Navigation Bar
        </nav>
    </header>

    <main>
        <section>
            section 1
        </section>
        <aside>
            aside 1
        </aside>
    </main>

    <footer>
        Footer
    </footer>
</body>
</html>
